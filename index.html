<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineWorld 47 - 4K Pro</title>
    <style>
        :root { --gold: #eab308; --bg: #010409; --card: #161b22; --uhd: #3b82f6; }
        body { background: var(--bg); color: #e6edf3; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        header { padding: 15px; text-align: center; background: var(--bg); border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-weight: 900; font-size: 24px; text-transform: uppercase; margin-bottom: 10px; }
        #search { width: 90%; padding: 12px; border-radius: 50px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }

        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; scrollbar-width: none; background: #0d1117; }
        .tab { background: #21262d; color: #8b949e; border: 1px solid #30363d; padding: 8px 18px; border-radius: 20px; font-size: 10px; font-weight: bold; white-space: nowrap; }
        .tab.active { background: var(--gold); color: black; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; }
        .card { border-radius: 8px; overflow: hidden; background: var(--card); border: 1px solid #30363d; aspect-ratio: 2/3; position: relative; }
        .poster { width: 100%; height: 100%; object-fit: cover; }
        .quality-badge { position: absolute; top: 5px; left: 5px; background: var(--uhd); color: white; font-size: 7px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        /* UHD Pro Player */
        #player-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .p-nav { display: flex; flex-wrap: wrap; justify-content: space-between; padding: 10px; background: #000; align-items: center; border-bottom: 1px solid #333; gap: 5px; }
        .p-btn { border: none; padding: 8px 12px; border-radius: 6px; font-weight: 800; font-size: 10px; }
        .exit { background: #f85149; color: white; }
        .fix { background: var(--gold); color: black; }
        .uhd-btn { background: var(--uhd); color: white; }
        #video-frame-container { width: 100%; height: calc(100% - 85px); background: #000; }
    </style>
</head>
<body>

<header>
    <div class="logo">CineWorld 47</div>
    <input type="text" id="search" placeholder="Search 4K Movies...">
    <div class="tabs">
        <button class="tab active" onclick="setLang('kn', this)">KANNADA</button>
        <button class="tab" onclick="setLang('ta', this)">TAMIL</button>
        <button class="tab" onclick="setLang('te', this)">TELUGU</button>
        <button class="tab" onclick="setLang('hi', this)">HINDI</button>
        <button class="tab" onclick="setLang('en', this)">ENGLISH</button>
        <button class="tab" onclick="setEra('202', this)">LATEST 4K</button>
    </div>
</header>

<div id="grid" class="grid"></div>

<div id="player-ui">
    <div class="p-nav">
        <button class="p-btn exit" onclick="closeP()">✕ EXIT</button>
        <button class="p-btn uhd-btn" onclick="force4K()">💎 FORCE 4K UHD</button>
        <button class="p-btn fix" onclick="repair()">🔄 NEXT SERVER</button>
    </div>
    <div id="video-frame-container"></div>
</div>

<script>
    const API_KEY = 'd5155e13adbb6408a66943ef38d66367';
    let curL = 'kn', curE = '', curID = '', sIdx = 0;

    async function load() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "<div style='grid-column:span 3;text-align:center;padding:50px;'>⚡ Loading 4K Library...</div>";
        let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&with_original_language=${curL}`;
        if(curE) url += `&primary_release_date.gte=${curE}0-01-01`;

        const res = await fetch(url);
        const data = await res.json();
        grid.innerHTML = data.results.map(m => `
            <div class="card" onclick="play('${m.id}')">
                <span class="quality-badge">4K UHD</span>
                <img class="poster" src="https://image.tmdb.org/t/p/w342${m.poster_path}">
            </div>
        `).join('');
    }

    function setLang(l, b) { resetTabs(b); curL = l; curE = ''; load(); }
    function setEra(e, b) { resetTabs(b); curE = e; load(); }
    function resetTabs(b) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); b.classList.add('active'); }

    function play(id) {
        curID = id; sIdx = 0;
        document.getElementById('player-ui').style.display = 'block';
        repair();
    }

    function force4K() {
        sIdx = 2; 
        repair();
    }

    function repair() {
        const container = document.getElementById('video-frame-container');
        const list = [
            `https://vidsrc.vip/embed/movie/${curID}`,
            `https://vidsrc.pm/embed/movie/${curID}`,
            `https://embed.su/embed/movie/${curID}` 
        ];
        
        container.innerHTML = "";
        const frame = document.createElement('iframe');
        frame.setAttribute('allowfullscreen', 'true');
        frame.setAttribute('allow', 'autoplay; encrypted-media');
        frame.setAttribute('referrerpolicy', 'no-referrer');
        frame.style.width = "100%"; frame.style.height = "100%"; frame.style.border = "none";
        
        setTimeout(() => {
            frame.src = list[sIdx];
            container.appendChild(frame);
            sIdx = (sIdx + 1) % list.length;
        }, 100);
    }

    function closeP() {
        document.getElementById('video-frame-container').innerHTML = "";
        document.getElementById('player-ui').style.display = 'none';
    }

    window.onload = () => load();
</script>
</body>
</html>
